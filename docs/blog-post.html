<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/swift.min.js"></script>

    type="text/javascript"
    crossorigin>
  </script>

    window.DD_RUM && window.DD_RUM.init({
      clientToken: 'pubc261f160168ba8b6deeafb89573ba6c0',

    });

</head>
<body>
<header></header>
<div class="layout">
  <aside id="sidebar"></aside>
  <main>
    <article id="post-article">
      <div class="blog-loading">Loading post...</div>
    </article>
  </main>
  <aside id="toc"></aside>
</div>
<script src="nav.js"></script>

<style>
.blog-loading { color: var(--text-muted); font-size: 14px; padding: 2rem 0; }
.blog-error   { color: #f38ba8; font-size: 14px; padding: 2rem 0; }

.post-header { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
.post-header h1 { margin-bottom: 0.75rem; }
.post-byline {
  display: flex; align-items: center; gap: 1rem;
  font-size: 13px; color: var(--text-muted); flex-wrap: wrap;
}
.post-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.75rem; }
.post-tag {
  font-size: 11px; font-weight: 500;
  background: rgba(137,180,250,0.08); color: #89b4fa;
  border: 1px solid rgba(137,180,250,0.2);
  padding: 2px 8px; border-radius: 4px;
}

/* Markdown body styles */
.post-body h1 { display: none; } /* title already shown in header */
.post-body h2 { font-size: 1.35rem; font-weight: 700; margin: 2.5rem 0 0.9rem; color: #e2e2f0; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
.post-body h3 { font-size: 1.05rem; font-weight: 600; margin: 1.75rem 0 0.65rem; color: #e2e2f0; }
.post-body p  { margin-bottom: 1rem; line-height: 1.7; }
.post-body a  { color: var(--link); }
.post-body a:hover { text-decoration: underline; }
.post-body ul, .post-body ol { margin: 0.5rem 0 1rem 1.5rem; }
.post-body li { margin-bottom: 0.4rem; line-height: 1.65; }
.post-body strong { color: #e2e2f0; font-weight: 600; }
.post-body blockquote {
  border-left: 3px solid var(--accent);
  padding: 0.5rem 1rem;
  margin: 1.25rem 0;
  background: rgba(240,81,56,0.05);
  border-radius: 0 6px 6px 0;
}
.post-body blockquote p { margin: 0; color: var(--text-dim); font-style: italic; }
.post-body pre {
  margin: 1.5rem 0; border-radius: 10px;
  overflow: hidden; border: 1px solid var(--border);
}
.post-body pre code {
  font-size: 13px; display: block;
  padding: 1.25rem 1.5rem; overflow-x: auto;
  background: #1a1a2e;
}
.post-body code {
  font-family: "SF Mono", "JetBrains Mono", Consolas, monospace;
  font-size: 0.85em; background: var(--code-bg);
  padding: 0.15em 0.45em; border-radius: 4px;
  color: #cba6f7; border: 1px solid var(--border);
}
.post-body pre code { border: none; border-radius: 0; padding: 1.25rem 1.5rem; }
.post-body hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
</style>

<script>
const REPO   = "kunal732/strands-agents-swift";
const BRANCH = "master";
const RAW    = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;

function slug() {
  return new URLSearchParams(window.location.search).get("slug");
}

async function loadPost() {
  const article = document.getElementById("post-article");
  const s = slug();

  if (!s) {
    article.innerHTML = `<p class="blog-error">No post specified.</p>`;
    return;
  }

  try {
    // Load index for metadata
    const [indexRes, mdRes] = await Promise.all([
      fetch(`${RAW}/blog/index.json`),
      fetch(`${RAW}/blog/posts/${s}.md`)
    ]);

    if (!mdRes.ok) throw new Error(`Post not found (HTTP ${mdRes.status})`);
    const { posts } = await indexRes.json();
    const meta = posts.find(p => p.slug === s) || {};

    const md = await mdRes.text();
    const html = marked.parse(md);

    const date = meta.date ? new Date(meta.date).toLocaleDateString("en-US", {
      year: "numeric", month: "long", day: "numeric"
    }) : "";
    const tags = (meta.tags || []).map(t => `<span class="post-tag">${t}</span>`).join("");

    article.innerHTML = `
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="breadcrumb-sep">›</span>
        <a href="blog.html">Blog</a>
        <span class="breadcrumb-sep">›</span>
        ${meta.title || s}
      </div>
      <div class="post-header">
        <h1>${meta.title || s}</h1>
        <div class="post-byline">
          ${date ? `<span>${date}</span>` : ""}
          ${meta.author ? `<span>by ${meta.author}</span>` : ""}
        </div>
        ${tags ? `<div class="post-tags">${tags}</div>` : ""}
      </div>
      <div class="post-body">${html}</div>
      <div class="page-nav" style="margin-top:3rem">
        <a href="blog.html"><span class="nav-dir">← Back</span><span class="nav-title">All Posts</span></a>
      </div>`;

    // Update page title
    if (meta.title) document.title = `${meta.title} | Strands Agents Swift`;

    // Syntax highlight code blocks
    document.querySelectorAll(".post-body pre code").forEach(el => hljs.highlightElement(el));

    // Build TOC from headings in the rendered post
    buildTOC();

  } catch (err) {
    article.innerHTML = `<p class="blog-error">Could not load post: ${err.message}</p>`;
  }
}

document.addEventListener("DOMContentLoaded", loadPost);
</script>
</body>
</html>
