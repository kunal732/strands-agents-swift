<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Strands Agents Swift</title>
  <link rel="stylesheet" href="styles.css">
  <script
    src="https://www.datadoghq-browser-agent.com/us1/v6/datadog-rum.js"
    type="text/javascript"
    crossorigin>
  </script>
  <script>
    window.DD_RUM && window.DD_RUM.init({
      clientToken: 'pubc261f160168ba8b6deeafb89573ba6c0',
      applicationId: 'fca7ce12-b9b8-46c5-9aeb-775968406461',
      site: 'datadoghq.com',
      service: 'communitystrands',
      env: 'prod',
      version: '0.0.1',
      sessionSampleRate: 100,
      sessionReplaySampleRate: 100,
      trackBfcacheViews: true,
      defaultPrivacyLevel: 'allow',
    });
  </script>
</head>
<body>
<header></header>
<div class="layout">
  <aside id="sidebar"></aside>
  <main>
    <article>
      <h1>Blog</h1>
      <p class="page-description">Updates, guides, and release notes from the community.</p>

      <div id="blog-list"><div class="blog-loading">Loading posts...</div></div>
    </article>
  </main>
  <aside id="toc"></aside>
</div>
<script src="nav.js"></script>

<style>
.blog-loading { color: var(--text-muted); font-size: 14px; padding: 2rem 0; }
.blog-error   { color: #f38ba8; font-size: 14px; padding: 2rem 0; }

.post-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.5rem;
  margin-bottom: 1.25rem;
  background: var(--code-bg);
  transition: border-color 0.15s;
}
.post-card:hover { border-color: rgba(240,81,56,0.4); }

.post-meta {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 0.6rem;
  flex-wrap: wrap;
}
.post-date   { font-size: 12.5px; color: var(--text-muted); }
.post-author { font-size: 12.5px; color: var(--text-muted); }

.post-title {
  font-size: 1.2rem;
  font-weight: 700;
  color: #e2e2f0;
  text-decoration: none;
  display: block;
  margin-bottom: 0.5rem;
  letter-spacing: -0.01em;
}
.post-title:hover { color: var(--accent); text-decoration: none; }

.post-description { font-size: 13.5px; color: var(--text-dim); line-height: 1.6; margin-bottom: 0.85rem; }

.post-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.post-tag {
  font-size: 11px; font-weight: 500;
  background: rgba(137,180,250,0.08);
  color: #89b4fa;
  border: 1px solid rgba(137,180,250,0.2);
  padding: 2px 8px; border-radius: 4px;
}

.post-read-more {
  display: inline-block;
  margin-top: 0.75rem;
  font-size: 13px;
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}
.post-read-more:hover { text-decoration: underline; }

.blog-contribute {
  margin-top: 2.5rem;
  padding: 1.25rem 1.5rem;
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.blog-contribute h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.4rem; color: #e2e2f0; }
.blog-contribute p  { font-size: 13.5px; color: var(--text-dim); margin: 0; line-height: 1.6; }
.blog-contribute a  { color: var(--link); }
</style>

<script>
const REPO   = "kunal732/strands-agents-swift";
const BRANCH = "master";
const RAW    = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;

async function loadBlog() {
  const list = document.getElementById("blog-list");
  try {
    const res = await fetch(`${RAW}/blog/index.json`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { posts } = await res.json();

    if (!posts || posts.length === 0) {
      list.innerHTML = `<p class="blog-loading">No posts yet.</p>`;
      return;
    }

    const cards = posts.map(post => {
      const date = new Date(post.date).toLocaleDateString("en-US", {
        year: "numeric", month: "long", day: "numeric"
      });
      const tags = (post.tags || []).map(t => `<span class="post-tag">${t}</span>`).join("");
      return `
        <div class="post-card">
          <div class="post-meta">
            <span class="post-date">${date}</span>
            <span class="post-author">by ${post.author}</span>
          </div>
          <a class="post-title" href="blog-post.html?slug=${post.slug}">${post.title}</a>
          <p class="post-description">${post.description}</p>
          <div class="post-tags">${tags}</div>
          <a class="post-read-more" href="blog-post.html?slug=${post.slug}">Read post →</a>
        </div>`;
    }).join("");

    list.innerHTML = cards + `
      <div class="blog-contribute">
        <h3>Write for the blog</h3>
        <p>Community posts are welcome. Open a pull request adding a markdown file to
        <a href="https://github.com/${REPO}/tree/${BRANCH}/blog/posts" target="_blank"><code>blog/posts/</code></a>
        and an entry to <a href="https://github.com/${REPO}/blob/${BRANCH}/blog/index.json" target="_blank"><code>blog/index.json</code></a>.
        Posts are reviewed before merging.</p>
      </div>`;
  } catch (err) {
    list.innerHTML = `<p class="blog-error">Could not load posts: ${err.message}</p>`;
  }
}

document.addEventListener("DOMContentLoaded", loadBlog);
</script>
</body>
</html>
